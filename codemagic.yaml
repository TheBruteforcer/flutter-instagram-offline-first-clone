workflows:
  flutter-instagram-clone:
    name: Flutter Instagram Clone Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - flutter_credentials
      vars:
        FLUTTER_VERSION: "3.13.0" # Use the Flutter version matching your project
        ANDROID_SDK_VERSION: "34"
        BUILD_NUMBER: $(date +%s) # Auto-incrementing build number
      paths:
        - $HOME/.pub-cache
        - /usr/local/share/android-sdk
    triggering:
      events:
        - push
        - pull_request
    scripts:
      - name: Set up Flutter environment
        script: |
          flutter --version
          echo "Using Flutter version: $(flutter --version)"
          flutter pub get

      - name: Generate environment files
        script: |
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Fix Gradle issues (force SDK compatibility)
        script: |
          echo "org.gradle.jvmargs=-Xmx4096M" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          sed -i -e 's/compileSdkVersion.*/compileSdkVersion 34/' android/app/build.gradle
          sed -i -e 's/targetSdkVersion.*/targetSdkVersion 34/' android/app/build.gradle
          rm -rf ~/.gradle/caches/ # Clear Gradle cache
          flutter clean
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release --build-number=$BUILD_NUMBER

      - name: Build App Bundle (AAB)
        script: |
          flutter build appbundle --release --build-number=$BUILD_NUMBER

      - name: Archive artifacts
        script: |
          mkdir -p build_outputs
          cp build/app/outputs/flutter-apk/app-release.apk build_outputs/
          cp build/app/outputs/bundle/release/app-release.aab build_outputs/

    artifacts:
      - build_outputs/**
    publishing:
      email:
        recipients:
          - "your-email@example.com"
        notify:
          success: true
          failure: true