workflows:
  flutter-instagram-clone:
    name: Flutter Instagram Clone Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - flutter_credentials
      vars:
        FLUTTER_VERSION: "3.13.0" # Use the Flutter version matching your project
        ANDROID_SDK_VERSION: "34"
        BUILD_NUMBER: $(date +%s) # Auto-incrementing build number
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
    scripts:
      # Step 1: Set up Flutter environment and get dependencies
      - name: Set up Flutter environment
        script: |
          flutter --version
          echo "Using Flutter version: $(flutter --version)"
          flutter doctor
          flutter pub get # Ensure all dependencies are fetched

      # Step 2: Generate environment files
      - name: Generate environment files
        script: |
          flutter pub get # Ensure all packages are installed
          flutter pub run build_runner build --delete-conflicting-outputs
          
      # Step 3: Fix Gradle issues and ensure SDK compatibility
      - name: Fix Gradle issues (force SDK compatibility)
        script: |
          echo "org.gradle.jvmargs=-Xmx4096M" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          sed -i -e 's/compileSdkVersion.*/compileSdkVersion 34/' android/app/build.gradle
          sed -i -e 's/targetSdkVersion.*/targetSdkVersion 34/' android/app/build.gradle
          
          # Fix missing Dart SDK issue and ensure proper setup
          flutter doctor
          
          # Clean and get dependencies again
          flutter clean
          flutter pub get

      # Step 4: Build APK
      - name: Build APK
        script: |
          flutter build apk --release --build-number=$BUILD_NUMBER

      # Step 5: Build App Bundle (AAB)
      - name: Build App Bundle (AAB)
        script: |
          flutter build appbundle --release --build-number=$BUILD_NUMBER

      # Step 6: Archive artifacts for download
      - name: Archive artifacts
        script: |
          mkdir -p build_outputs
          cp build/app/outputs/flutter-apk/app-release.apk build_outputs/
          cp build/app/outputs/bundle/release/app-release.aab build_outputs/

    artifacts:
      - build_outputs/**
      
    publishing:
      email:
        recipients:
          - "your-email@example.com"
        notify:
          success: true
          failure: true