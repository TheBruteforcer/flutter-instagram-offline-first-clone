name: Build Flutter Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # ✅ Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # ✅ Updated to latest version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "Omar123$" \
            -keypass "Omar123$" \
            -alias "Omar123$" \
            -dname "CN=Your Name, OU=YourOrg, O=YourCompany, L=YourCity, S=YourState, C=YourCountry"

      - name: Move Keystore
        run: mv release-keystore.jks android/app/release-keystore.jks

      - name: Setup Environment Variables
        run: |
          echo "ANDROID_KEYSTORE_PATH=android/app/release-keystore.jks" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          flutter clean
          rm -rf android/.gradle
          rm -rf ~/.gradle/caches
          flutter pub get
          cd android && ./gradlew clean && cd ..
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4  # ✅ Fixed deprecated action
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
