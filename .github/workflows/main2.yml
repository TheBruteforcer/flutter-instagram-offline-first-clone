name: Build Flutter Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # ✅ Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # ✅ Updated to latest version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'




      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Keystore
        run: |
          mkdir -p android/app/android/app/android/app/  # ✅ Ensure directory exists
          keytool -genkeypair -v \
            -keystore android/app/android/app/android/app/release-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "Omar123$" \
            -keypass "Omar123$" \
            -alias "Omar123$" \
            -dname "CN=Your Name, OU=YourOrg, O=YourCompany, L=YourCity, S=YourState, C=YourCountry"

      - name: Setup Environment Variables
        run: |
          echo "ANDROID_KEYSTORE_PATH=android/app/android/app/release-keystore.jks" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_ALIAS=Omar123$" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=Omar123$" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PRIVATE_KEY_PASSWORD=Omar123$" >> $GITHUB_ENV

      - name: Build APK
        run: |
          flutter clean
          rm -rf android/.gradle
          rm -rf ~/.gradle/caches
          flutter gen-l10n
          flutter pub get
          flutter pub add powersync_flutter_libs
          flutter pub add photo_manager:^3.0.0
          flutter pub add app_links
          flutter pub add blurhash
          flutter pub add camera
          flutter pub add firebase_core
          flutter pub add firebase_messaging
          flutter pub add firebase_remote_config
          flutter pub add flutter_plugin_android_lifecycle
          flutter pub add fluttertoast
          flutter pub add google_sign_in
          flutter pub add image_crop
          flutter pub add image_gallery_saver
          flutter pub add image_picker
          flutter pub add path_provider
          flutter pub add photo_manager
          flutter pub add shared_preferences
          flutter pub add sqflite
          flutter pub add sqlite3_flutter_libs
          flutter pub add url_launcher
          flutter pub add video_compress
          flutter pub add video_player
          flutter pub add video_thumbnail

          cd android && ./gradlew clean && ./gradlew dependencies --refresh-dependencies && cd ..
          gradle wrapper
          ./gradlew wrapper --gradle-version 8.1 --distribution-type=bin
          flutter pub cache repair
          flutter doctor -v
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4  # ✅ Fixed deprecated action
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
